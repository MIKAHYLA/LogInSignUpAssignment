<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to IT World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1a001f, #0f0014, #000000);
}

.container{
    width:100%;
    max-width:360px;
    padding:30px;
    border-radius:20px;
    background: rgba(20, 0, 25, 0.95);
    box-shadow:
        0 0 25px rgba(255, 20, 147, 0.4),
        0 0 60px rgba(255, 20, 147, 0.2);
    border:1px solid rgba(255,105,180,0.3);
}

.app-title{
    text-align:center;
    font-size:20px;
    font-weight:600;
    margin-bottom:20px;
    color:#ff4da6;
    text-shadow:0 0 15px rgba(255, 77, 166, 0.7);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:white;
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    border:1px solid rgba(255,105,180,0.3);
    background:#140017;
    color:white;
    transition:0.3s;
}

input::placeholder{
    color:#aaa;
}

input:focus{
    outline:none;
    border-color:#ff4da6;
    box-shadow:0 0 10px rgba(255,77,166,0.6);
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(90deg, #ff1493, #ff4da6);
    color:white;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 20px rgba(255,20,147,0.8);
    transform:translateY(-2px);
}

.google{
    background:white;
    color:#111;
}

.google:hover{
    box-shadow:0 0 15px rgba(255,255,255,0.6);
}

.link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#ff99cc;
    cursor:pointer;
}

.link:hover{
    text-decoration:underline;
}

.dashboard{
    text-align:center;
    color:white;
}

.dashboard p{
    margin:15px 0;
    color:#ff99cc;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="app-title">Welcome to IT World</div>

    <div id="signupDiv">
        <h2>Create Account</h2>
        <input type="text" id="signupFirstName" placeholder="First Name">
        <input type="text" id="signupLastName" placeholder="Last Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button id="signupBtn">Sign Up</button>
        <button class="google" id="googleSignUp">Sign Up with Google</button>
        <div class="link" onclick="showLogin()">Already have an account? Log In</div>
    </div>

    <div id="loginDiv" class="hidden">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <div class="link" id="forgotPassword">Forgot Password?</div>
        <button id="loginBtn">Log In</button>
        <button class="google" id="googleLogin">Log In with Google</button>
        <div class="link" onclick="showSignup()">Don't have an account? Sign Up</div>
    </div>

    <div id="dashboard" class="hidden dashboard">
        <h2>Welcome</h2>
        <p id="userEmail"></p>
        <button id="logoutBtn">Log Out</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged,
    sendPasswordResetEmail,
    updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDE_v02suHKtqedKsuZTgXSEIFkvICa7fk",
  authDomain: "loginsignupassignment-5862b.firebaseapp.com",
  projectId: "loginsignupassignment-5862b",
  storageBucket: "loginsignupassignment-5862b.firebasestorage.app",
  messagingSenderId: "981525201780",
  appId: "1:981525201780:web:3f89bc4d6ff1fa7b066221"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.showLogin = function(){
    signupDiv.classList.add("hidden");
    loginDiv.classList.remove("hidden");
}

window.showSignup = function(){
    loginDiv.classList.add("hidden");
    signupDiv.classList.remove("hidden");
}

signupBtn.onclick = async () => {
    try {
        const userCredential = await createUserWithEmailAndPassword(
            auth,
            signupEmail.value,
            signupPassword.value
        );

        await updateProfile(userCredential.user, {
            displayName: signupFirstName.value + " " + signupLastName.value
        });

        alert("Account created successfully!");
    } catch (error) {
        alert(error.message);
    }
};

googleSignUp.onclick = () => signInWithPopup(auth, provider);
googleLogin.onclick = () => signInWithPopup(auth, provider);

loginBtn.onclick = () => {
    signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value)
    .catch(error => alert(error.message));
};

forgotPassword.onclick = () => {
    if(loginEmail.value === ""){
        alert("Enter your email first.");
        return;
    }

    sendPasswordResetEmail(auth, loginEmail.value)
    .then(() => alert("Password reset email sent!"))
    .catch(error => alert(error.message));
};

logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    if(user){
        signupDiv.classList.add("hidden");
        loginDiv.classList.add("hidden");
        dashboard.classList.remove("hidden");

        userEmail.innerText = user.displayName
            ? user.displayName + " (" + user.email + ")"
            : user.email;
    } else {
        dashboard.classList.add("hidden");
        signupDiv.classList.remove("hidden");
    }
});
</script>

</body>
</html>
